<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)">
<title>TITAN — ClinicFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ═══════════════════════════════════════
   DESIGN TOKENS — Light + Dark
═══════════════════════════════════════ */
:root {
  /* Surfaces */
  --bg:          #f2f2f7;
  --surface-1:   #ffffff;
  --surface-2:   #f5f5f7;
  --surface-3:   #ebebf0;
  --glass:       rgba(255,255,255,0.72);
  --glass-border: rgba(255,255,255,0.6);

  /* Ink */
  --ink-1: #0a0a0f;
  --ink-2: #3c3c44;
  --ink-3: #6c6c7a;
  --ink-4: #aeaeb8;
  --ink-5: #d1d1d8;

  /* Borders */
  --border-1: rgba(0,0,0,0.06);
  --border-2: rgba(0,0,0,0.10);

  /* Accent — Electric Blue */
  --accent:      #0066ff;
  --accent-soft: rgba(0,102,255,0.08);
  --accent-mid:  rgba(0,102,255,0.16);
  --accent-glow: rgba(0,102,255,0.24);

  /* Semantic */
  --green:       #00c853;
  --green-soft:  rgba(0,200,83,0.1);
  --yellow:      #ff9500;
  --yellow-soft: rgba(255,149,0,0.1);
  --red:         #ff3b30;
  --red-soft:    rgba(255,59,48,0.08);
  --purple:      #bf5af2;
  --purple-soft: rgba(191,90,242,0.1);

  /* Aurora gradient */
  --aurora: linear-gradient(135deg, rgba(0,102,255,0.04) 0%, rgba(191,90,242,0.04) 50%, rgba(0,200,83,0.04) 100%);

  /* Typography */
  --font:  'Geist', -apple-system, sans-serif;
  --mono:  'Geist Mono', 'SF Mono', monospace;

  /* Radii */
  --r-xs: 6px;
  --r-sm: 10px;
  --r:    14px;
  --r-lg: 20px;
  --r-xl: 28px;

  /* Shadows */
  --shadow-xs: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
  --shadow:    0 8px 24px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
  --shadow-lg: 0 24px 64px rgba(0,0,0,0.12), 0 8px 24px rgba(0,0,0,0.06);
  --shadow-xl: 0 48px 96px rgba(0,0,0,0.16), 0 16px 48px rgba(0,0,0,0.08);

  /* Nav */
  --nav-w: 232px;
  --nav-h: 56px;

  /* Transitions */
  --ease: cubic-bezier(0.32, 0.72, 0, 1);
  --ease-out: cubic-bezier(0, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg:          #0a0a0f;
  --surface-1:   #141418;
  --surface-2:   #1c1c22;
  --surface-3:   #242430;
  --glass:       rgba(20,20,24,0.80);
  --glass-border: rgba(255,255,255,0.08);

  --ink-1: #f2f2f7;
  --ink-2: #c7c7d4;
  --ink-3: #8e8ea0;
  --ink-4: #5a5a6e;
  --ink-5: #2e2e3e;

  --border-1: rgba(255,255,255,0.06);
  --border-2: rgba(255,255,255,0.10);

  --accent-soft: rgba(0,102,255,0.12);
  --accent-mid:  rgba(0,102,255,0.20);
  --accent-glow: rgba(0,102,255,0.30);

  --aurora: linear-gradient(135deg, rgba(0,102,255,0.06) 0%, rgba(191,90,242,0.06) 50%, rgba(0,200,83,0.06) 100%);

  --shadow-sm: 0 2px 8px rgba(0,0,0,0.24), 0 1px 3px rgba(0,0,0,0.16);
  --shadow:    0 8px 24px rgba(0,0,0,0.32), 0 2px 8px rgba(0,0,0,0.16);
  --shadow-lg: 0 24px 64px rgba(0,0,0,0.48), 0 8px 24px rgba(0,0,0,0.24);
}

/* ═══════════════════════════════════════
   RESET + BASE
═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; color-scheme: light dark; }
body {
  background: var(--bg);
  color: var(--ink-1);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  height: 100%;
  overflow: hidden;
  transition: background 0.3s var(--ease-out), color 0.3s var(--ease-out);
}

::-webkit-scrollbar { width: 0; height: 0; }
::selection { background: var(--accent-mid); }

/* Aurora background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: var(--aurora);
  pointer-events: none;
  z-index: 0;
}

/* ═══════════════════════════════════════
   APP SHELL
═══════════════════════════════════════ */
.app { display: flex; height: 100dvh; overflow: hidden; position: relative; z-index: 1; }

/* ═══════════════════════════════════════
   SIDEBAR — Liquid Glass
═══════════════════════════════════════ */
.sidebar {
  width: var(--nav-w);
  min-width: var(--nav-w);
  background: var(--glass);
  backdrop-filter: blur(32px) saturate(180%);
  -webkit-backdrop-filter: blur(32px) saturate(180%);
  border-right: 1px solid var(--glass-border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.sidebar-logo {
  padding: 22px 18px 16px;
  border-bottom: 1px solid var(--border-1);
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 30px; height: 30px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: -0.5px;
  box-shadow: 0 4px 12px rgba(0,102,255,0.35);
  flex-shrink: 0;
}

.logo-text { font-size: 15px; font-weight: 700; color: var(--ink-1); letter-spacing: -0.3px; }
.logo-badge {
  margin-left: auto;
  font-size: 9px;
  font-weight: 600;
  padding: 2px 6px;
  background: var(--accent-soft);
  color: var(--accent);
  border-radius: 20px;
  letter-spacing: 0.3px;
}

.sidebar-section {
  padding: 18px 14px 4px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--ink-4);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 10px;
  margin: 1px 6px;
  border-radius: var(--r-sm);
  cursor: pointer;
  color: var(--ink-3);
  font-size: 13.5px;
  font-weight: 450;
  transition: background 0.12s, color 0.12s;
  user-select: none;
  position: relative;
}

.nav-item:hover { background: var(--border-1); color: var(--ink-1); }
.nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }

.nav-icon {
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  opacity: 0.7;
  transition: opacity 0.12s;
}

.nav-item.active .nav-icon,
.nav-item:hover .nav-icon { opacity: 1; }

.nav-badge {
  margin-left: auto;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 20px;
  min-width: 18px;
  text-align: center;
  line-height: 16px;
}

.badge-red-pill  { background: var(--red);    color: white; }
.badge-blue-pill { background: var(--accent);  color: white; }
.badge-notif     { background: var(--red); color: white; }

.sidebar-bottom {
  margin-top: auto;
  padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
  border-top: 1px solid var(--border-1);
}

.user-row {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 6px;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: background 0.12s;
}
.user-row:hover { background: var(--border-1); }

.avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}

.user-name { font-size: 13px; font-weight: 600; color: var(--ink-1); }
.user-role { font-size: 11px; color: var(--ink-4); }

.sidebar-actions {
  display: flex;
  gap: 4px;
  margin-top: 8px;
}

.sidebar-btn {
  flex: 1;
  padding: 7px;
  background: transparent;
  border: 1px solid var(--border-2);
  border-radius: var(--r-sm);
  color: var(--ink-3);
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.12s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.sidebar-btn:hover { background: var(--border-1); color: var(--ink-1); }
.sidebar-btn.danger:hover { background: var(--red-soft); color: var(--red); border-color: rgba(255,59,48,0.2); }

/* ═══════════════════════════════════════
   MAIN
═══════════════════════════════════════ */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* ═══════════════════════════════════════
   TOPBAR
═══════════════════════════════════════ */
.topbar {
  height: var(--nav-h);
  background: var(--glass);
  backdrop-filter: blur(32px) saturate(180%);
  -webkit-backdrop-filter: blur(32px) saturate(180%);
  border-bottom: 1px solid var(--border-1);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 10px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-title { font-size: 15px; font-weight: 600; color: var(--ink-1); flex: 1; letter-spacing: -0.2px; }

.search-trigger {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: var(--surface-2);
  border: 1px solid var(--border-1);
  border-radius: var(--r-sm);
  color: var(--ink-4);
  font-size: 12.5px;
  cursor: pointer;
  transition: all 0.15s;
  min-width: 180px;
}
.search-trigger:hover { border-color: var(--border-2); color: var(--ink-3); background: var(--surface-3); }
.search-kbd {
  margin-left: auto;
  display: flex;
  gap: 2px;
}
.kbd {
  padding: 1px 5px;
  background: var(--surface-3);
  border: 1px solid var(--border-2);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-4);
}

.health-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11.5px;
  font-weight: 600;
}
.health-chip.green  { background: var(--green-soft);  color: #008f3a; }
.health-chip.yellow { background: var(--yellow-soft); color: #9a5800; }
.health-chip.red    { background: var(--red-soft);    color: #c0291f; }
[data-theme="dark"] .health-chip.green  { color: var(--green); }
[data-theme="dark"] .health-chip.yellow { color: var(--yellow); }
[data-theme="dark"] .health-chip.red    { color: var(--red); }

.health-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
}
.green  .health-dot { background: var(--green); }
.yellow .health-dot { background: var(--yellow); animation: pulse 2s infinite; }
.red    .health-dot { background: var(--red); animation: pulse 0.8s infinite; }

@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

.topbar-time { font-family: var(--mono); font-size: 11px; color: var(--ink-4); letter-spacing: 0.3px; }

.icon-btn {
  width: 32px; height: 32px;
  border-radius: var(--r-sm);
  border: none;
  background: transparent;
  color: var(--ink-3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  transition: background 0.12s, color 0.12s;
  position: relative;
  flex-shrink: 0;
}
.icon-btn:hover { background: var(--border-1); color: var(--ink-1); }
.icon-btn .notif-dot {
  position: absolute;
  top: 4px; right: 4px;
  width: 7px; height: 7px;
  background: var(--red);
  border-radius: 50%;
  border: 1.5px solid var(--surface-1);
}

/* ═══════════════════════════════════════
   CONTENT
═══════════════════════════════════════ */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  padding-bottom: calc(24px + env(safe-area-inset-bottom));
}

/* ═══════════════════════════════════════
   BENTO GRID — The signature layout
═══════════════════════════════════════ */
.bento {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.bento-card {
  background: var(--surface-1);
  border: 1px solid var(--border-1);
  border-radius: var(--r-lg);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.2s var(--ease), box-shadow 0.2s var(--ease), border-color 0.2s;
  position: relative;
  overflow: hidden;
}

.bento-card:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow);
  border-color: var(--border-2);
}

.bento-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--aurora);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

.bento-card:hover::before { opacity: 1; }

/* Span helpers */
.col-3  { grid-column: span 3; }
.col-4  { grid-column: span 4; }
.col-6  { grid-column: span 6; }
.col-8  { grid-column: span 8; }
.col-12 { grid-column: span 12; }

/* ═══════════════════════════════════════
   KPI CARD with sparkline
═══════════════════════════════════════ */
.kpi-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-4);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.kpi-value {
  font-size: 34px;
  font-weight: 800;
  letter-spacing: -2px;
  line-height: 1;
  color: var(--ink-1);
  margin-bottom: 4px;
}

.kpi-value.accent { color: var(--accent); }
.kpi-value.green  { color: var(--green); }
.kpi-value.yellow { color: var(--yellow); }
.kpi-value.red    { color: var(--red); }
.kpi-value.purple { color: var(--purple); }

.kpi-sub {
  font-size: 12px;
  color: var(--ink-4);
  margin-bottom: 12px;
}

.trend-up   { color: var(--green); }
.trend-down { color: var(--red); }

/* Sparkline SVG */
.sparkline { width: 100%; height: 36px; overflow: visible; }
.sparkline-line { fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.sparkline-area { opacity: 0.12; }

/* ═══════════════════════════════════════
   CARDS
═══════════════════════════════════════ */
.card {
  background: var(--surface-1);
  border: 1px solid var(--border-1);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  margin-bottom: 16px;
  transition: border-color 0.15s;
}

.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-1);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-title { font-size: 13.5px; font-weight: 600; color: var(--ink-1); letter-spacing: -0.1px; }
.card-meta  { font-size: 12px; color: var(--ink-4); }
.card-body  { padding: 20px; }

/* ═══════════════════════════════════════
   SECTION HEADER
═══════════════════════════════════════ */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.section-title {
  font-size: 21px;
  font-weight: 800;
  color: var(--ink-1);
  letter-spacing: -0.6px;
}

/* ═══════════════════════════════════════
   TABLES
═══════════════════════════════════════ */
.table-wrap { overflow-x: auto; }

table { width: 100%; border-collapse: collapse; }

th {
  text-align: left;
  padding: 10px 16px;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-4);
  background: var(--surface-2);
  border-bottom: 1px solid var(--border-1);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-1);
  font-size: 13px;
  color: var(--ink-1);
  vertical-align: middle;
}

tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface-2); }

/* ═══════════════════════════════════════
   BADGES
═══════════════════════════════════════ */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
}

.badge-blue   { background: var(--accent-soft); color: var(--accent); }
.badge-green  { background: var(--green-soft);  color: var(--green); }
.badge-yellow { background: var(--yellow-soft); color: var(--yellow); }
.badge-red    { background: var(--red-soft);    color: var(--red); }
.badge-purple { background: var(--purple-soft); color: var(--purple); }
.badge-gray   { background: var(--surface-2);   color: var(--ink-3); border: 1px solid var(--border-2); }

[data-theme="dark"] .badge-green  { color: #4ddb80; }
[data-theme="dark"] .badge-yellow { color: #ffb340; }
[data-theme="dark"] .badge-red    { color: #ff6b63; }

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: var(--r-sm);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.12s;
  border: none;
  white-space: nowrap;
  user-select: none;
}

.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--accent);
  color: white;
  box-shadow: 0 2px 8px rgba(0,102,255,0.3);
}
.btn-primary:hover {
  background: #0055dd;
  box-shadow: 0 4px 16px rgba(0,102,255,0.4);
  transform: translateY(-1px);
}

.btn-ghost {
  background: transparent;
  color: var(--ink-3);
  border: 1px solid var(--border-2);
}
.btn-ghost:hover { background: var(--surface-2); color: var(--ink-1); }

.btn-danger {
  background: var(--red);
  color: white;
  box-shadow: 0 2px 8px rgba(255,59,48,0.25);
}
.btn-danger:hover { background: #e02d22; transform: translateY(-1px); }

.btn-success {
  background: var(--green-soft);
  color: var(--green);
  border: 1px solid rgba(0,200,83,0.2);
}
.btn-success:hover { background: rgba(0,200,83,0.18); }

.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: var(--r-xs); }
.btn-xs { padding: 3px 8px; font-size: 11px; border-radius: var(--r-xs); }

.icon-action {
  width: 28px; height: 28px;
  border-radius: var(--r-xs);
  border: 1px solid var(--border-2);
  background: transparent;
  color: var(--ink-3);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  transition: all 0.12s;
}
.icon-action:hover { background: var(--surface-2); color: var(--ink-1); border-color: var(--border-2); }
.icon-action:active { transform: scale(0.93); }

/* ═══════════════════════════════════════
   FORMS
═══════════════════════════════════════ */
.form-group { margin-bottom: 14px; }

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-3);
  margin-bottom: 5px;
  letter-spacing: 0.1px;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 9px 12px;
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  border-radius: var(--r-sm);
  color: var(--ink-1);
  font-family: var(--font);
  font-size: 13.5px;
  transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  outline: none;
  appearance: none;
}

.form-input:focus, .form-select:focus, .form-textarea:focus {

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── API ──────────────────────────────────
const api = {
  token: localStorage.getItem('tt'),
  setToken(t)  { this.token = t; localStorage.setItem('tt', t); },
  clearToken() { this.token = null; localStorage.removeItem('tt'); },
  async req(method, path, body) {
    const r = await fetch(path, {
      method,
      headers: { 'Content-Type':'application/json', ...(this.token ? { Authorization:`Bearer ${this.token}` } : {}) },
      ...(body != null ? { body: JSON.stringify(body) } : {})
    });
    if (r.status === 401) { this.clearToken(); window.location.reload(); return; }
    return r.json();
  },
  get:    p    => api.req('GET', p),
  post:   (p,b)=> api.req('POST', p, b),
  patch:  (p,b)=> api.req('PATCH', p, b),
  delete: p    => api.req('DELETE', p),
};

// ── TOAST ────────────────────────────────
let _setToasts = null;
function Toasts() {
  const [list, setList] = useState([]);
  _setToasts = setList;
  return (
    <div className="toasts">
      {list.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.icon} {t.msg}</div>)}
    </div>
  );
}
function toast(msg, type='info') {
  if (!_setToasts) return;
  const icons = { success:'✓', error:'✕', info:'·' };
  const id = Date.now();
  _setToasts(p => [...p, { id, msg, type, icon: icons[type] || '·' }]);
  setTimeout(() => _setToasts(p => p.filter(x => x.id !== id)), 3200);
}

// ── SPARKLINE ────────────────────────────
function Sparkline({ data, color = 'var(--accent)', height = 36 }) {
  if (!data || data.length < 2) return null;
  const w = 100, h = height;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => [
    (i / (data.length - 1)) * w,
    h - ((v - min) / range) * (h * 0.8) - h * 0.1
  ]);
  const line = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const area = `${line} L${pts[pts.length-1][0]},${h} L0,${h} Z`;
  return (
    <svg className="sparkline" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id={`sg-${color.replace(/[^a-z]/gi,'')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#sg-${color.replace(/[^a-z]/gi,'')})`} />
      <path d={line} className="sparkline-line" stroke={color} />
    </svg>
  );
}

// ── COMMAND PALETTE ───────────────────────
function CommandPalette({ onClose, onNavigate }) {
  const [query, setQuery] = useState('');
  const [sel, setSel] = useState(0);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, []);

  const COMMANDS = [
    { group:'Navigate', icon:'◈', label:'Overview', desc:'Dashboard home', action:() => onNavigate('overview') },
    { group:'Navigate', icon:'✓', label:'Tasks',    desc:'Task tracker',   action:() => onNavigate('tasks') },
    { group:'Navigate', icon:'◉', label:'Pipeline', desc:'Sales pipeline', action:() => onNavigate('leads') },
    { group:'Navigate', icon:'⬡', label:'Bugs',     desc:'Bug tracker',    action:() => onNavigate('bugs') },
    { group:'Navigate', icon:'⬢', label:'Onboarding',desc:'Client setup',  action:() => onNavigate('onboardings') },
    { group:'Navigate', icon:'📊', label:'Revenue',  desc:'MRR tracker',   action:() => onNavigate('revenue') },
    { group:'Navigate', icon:'⚡', label:'Activity', desc:'Live feed',      action:() => onNavigate('activity') },
    { group:'Navigate', icon:'🚀', label:'Deploy',   desc:'Deploy manager',  action:() => onNavigate('deploy') },
    { group:'Navigate', icon:'◈', label:'Intelligence',desc:'TITAN analytics',action:() => onNavigate('intelligence') },
    { group:'Navigate', icon:'⌘', label:'Commands', desc:'All bot commands', action:() => onNavigate('commands') },
    { group:'Actions',  icon:'📢', label:'Post Announcement', desc:'Slack Control', action:() => onNavigate('slackcontrol') },
    { group:'Actions',  icon:'⌛', label:'Send Reflection',  desc:'Trigger end-of-day', action:() => api.post('/api/slack/reflection').then(r => { toast(r?.success?'Reflection sent':'Failed', r?.success?'success':'error'); onClose(); }) },
    { group:'Actions',  icon:'⚡', label:'Trigger Briefing', desc:'Post AI briefing',    action:() => api.post('/api/slack/briefing').then(r => { toast(r?.success?'Briefing triggered':'Failed', r?.success?'success':'error'); onClose(); }) },
  ];

  const filtered = query
    ? COMMANDS.filter(c => c.label.toLowerCase().includes(query.toLowerCase()) || c.desc.toLowerCase().includes(query.toLowerCase()))
    : COMMANDS;

  const groups = [...new Set(filtered.map(c => c.group))];

  useEffect(() => { setSel(0); }, [query]);

  function handleKey(e) {
    if (e.key === 'ArrowDown') { e.preventDefault(); setSel(s => Math.min(s+1, filtered.length-1)); }
    if (e.key === 'ArrowUp')   { e.preventDefault(); setSel(s => Math.max(s-1, 0)); }
    if (e.key === 'Enter')     { filtered[sel]?.action(); onClose(); }
    if (e.key === 'Escape')    { onClose(); }
  }

  let idx = -1;

  return (
    <div className="cmd-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="cmd-box">
        <div className="cmd-input-wrap">
          <span className="cmd-input-icon">⌘</span>
          <input ref={inputRef} className="cmd-input" placeholder="Type a command or search…" value={query} onChange={e => setQuery(e.target.value)} onKeyDown={handleKey} />
          <span className="kbd" style={{fontSize:11, color:'var(--ink-4)'}}>ESC</span>
        </div>
        <div className="cmd-results">
          {groups.map(group => (
            <div key={group}>
              <div className="cmd-group-label">{group}</div>
              {filtered.filter(c => c.group===group).map(cmd => {
                idx++;
                const i = idx;
                return (
                  <div key={cmd.label} className={`cmd-item ${sel===i?'selected':''}`}
                    onClick={() => { cmd.action(); onClose(); }}
                    onMouseEnter={() => setSel(i)}>
                    <div className="cmd-item-icon">{cmd.icon}</div>
                    <span className="cmd-item-label">{cmd.label}</span>
                    <span className="cmd-item-desc">{cmd.desc}</span>
                  </div>
                );
              })}
            </div>
          ))}
          {filtered.length === 0 && <div className="empty" style={{padding:'24px'}}><div className="empty-text">No results for "{query}"</div></div>}
        </div>
        <div className="cmd-footer">
          <span><span className="kbd">↑↓</span> navigate</span>
          <span><span className="kbd">↵</span> select</span>
          <span><span className="kbd">ESC</span> close</span>
        </div>
      </div>
    </div>
  );
}

function Activity() {
  const [log, setLog] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    Promise.all([
      api.get('/api/interactions?limit=30'),
      api.get('/api/tasks?status=done'),
      api.get('/api/leads'),
    ]).then(([interactions, tasks, leads]) => {
      const feed = [];

      interactions?.slice(0,15).forEach(i => feed.push({
        type: 'titan', time: i.created_at,
        text: `TITAN handled "${i.normalized_text?.substring(0,60)}" → ${i.intent_matched}`,

      tasks?.slice(0,5).forEach(t => feed.push({
        type: 'task', time: t.created_at,

        color: 'var(--green)'

      leads?.filter(l=>l.status==='won').slice(0,3).forEach(l => feed.push({
        type: 'win', time: l.created_at,

      feed.sort((a,b) => new Date(b.time) - new Date(a.time));

function Deploy() {
  const [form, setForm] = useState({ version:'', notes:'', channel:'deployments', env:'production' });
  const [history, setHistory] = useState(() => {
    try { return JSON.parse(localStorage.getItem('deploy_history')||'[]'); } catch { return []; }
  });

  const CHS = [
    {key:'deployments',label:'#deployments'},{key:'general',label:'#general'},
    {key:'dev',label:'#engineering'},{key:'ops_alerts',label:'#ops-alerts'},
  ];

  async function deploy() {
    if (!form.version) return toast('Version required','error');
    const msg = `🚀 *Deploy — v${form.version}* (${form.env})\n\n${form.notes||'No notes.'}\n\n_Deployed via TITAN Dashboard · ${new Date().toLocaleTimeString('en-US',{timeZone:'America/El_Salvador'})}_`;
    const r = await api.post('/api/slack/announce', { channel: form.channel, message: msg });
    if (r?.success) {
      const entry = { ...form, ts: new Date().toLocaleString(), id: Date.now() };
      const updated = [entry, ...history].slice(0, 20);
      setHistory(updated);
      localStorage.setItem('deploy_history', JSON.stringify(updated));
      toast(`v${form.version} deployed to ${form.env} ✓`, 'success');
      setForm(p => ({...p, version:'', notes:''}));
    } else {

  );
}

                      <td><span className={`badge ${pc(t.priority)}`}>{t.priority?.replace(/[🔴🟠🟡🟢]/g,'').trim()}</span></td>

  const STAGE_STATUS = {'🎉 Closed Won':'won','❌ Closed Lost':'lost'};

  async function create() {
    if (!form.clinicName) return toast('Clinic name required','error');

    else toast(r?.error||'Failed','error');
  }

  async function move(id, stage) {
    const status = STAGE_STATUS[stage] || 'active';

          {label:'Lost',   val:leads.filter(l=>l.status==='lost').length, color:'red'},

      </div>
      <div className="card">
        {leads.length===0
          ? <div className="empty"><div className="empty-icon">💰</div><div className="empty-text">No leads yet</div></div>
          : <div className="table-wrap">
              <table>
                <thead><tr><th>ID</th><th>Clinic</th><th>Contact</th><th>Stage</th><th>Status</th><th></th></tr></thead>
                <tbody>
                  {leads.map(l=>(
                    <tr key={l.id}>
                      <td><span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--accent)',fontWeight:700}}>{l.id}</span></td>
                      <td style={{fontWeight:600}}>{l.clinic_name}</td>

                      <td>

                          {!['won','lost'].includes(l.status)&&<button className="btn btn-xs" style={{background:'var(--red-soft)',color:'var(--red)',border:'1px solid rgba(255,59,48,0.2)'}} onClick={()=>move(l.id,'❌ Closed Lost')}>Lost</button>}

            {[{f:'clinicName',l:'Clinic Name',p:'e.g. Clínica Santa Rosa'},{f:'contact',l:'Contact',p:'Name + WhatsApp'}].map(({f,l,p})=>(
              <div className="form-group" key={f}><label className="form-label">{l}</label><input className="form-input" value={form[f]} onChange={e=>setForm(prev=>({...prev,[f]:e.target.value}))} placeholder={p}/></div>

            </div>
          </div>
        </div>
      )}

  );

// ── ONBOARDINGS ──────────────────────────
function Onboardings() {
  const [onbs, setOnbs] = useState([]);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({ clinicName:'', owner:'', contact:'' });

  const load = () => api.get('/api/onboardings').then(setOnbs);
  useEffect(() => { load(); }, []);

  async function create() {
    if (!form.clinicName) return toast('Clinic name required','error');
    const r = await api.post('/api/onboardings', form);
    if (r?.id) { toast('Onboarding started','success'); setModal(false); load(); }
    else toast(r?.error||'Failed','error');
  }

  async function step(id, idx) {
    const r = await api.patch(`/api/onboardings/${id}/step`, { stepIndex:idx });
    if (r?.allDone) toast('🎉 Onboarding complete!','success');
    else toast('Step completed','success');
    load();
  }

  return (
    <div>
      <div className="section-header">
        <h1 className="section-title">Onboarding</h1>
        <button className="btn btn-primary btn-sm" onClick={()=>setModal(true)}>+ Start</button>
      </div>
      {onbs.length===0
        ? <div className="card"><div className="empty"><div className="empty-icon">🏥</div><div className="empty-text">No onboardings yet</div></div></div>
        : onbs.map(o=>{
            const done=o.steps?.filter(s=>s.done).length||0;
            const total=o.steps?.length||6;
            const pct=Math.round((done/total)*100);
            return (
              <div className="card" key={o.id} style={{marginBottom:12}}>
                <div className="card-header">
                  <div>
                    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:3}}>
                      <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--accent)',fontWeight:700}}>{o.id}</span>
                      <span style={{fontWeight:700,fontSize:15}}>{o.clinic_name}</span>
                      <span className={`badge ${o.status==='complete'?'badge-green':'badge-blue'}`}>{o.status}</span>
                    </div>
                    <div style={{fontSize:12,color:'var(--ink-4)'}}>Contact: {o.contact}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:24,fontWeight:900,color:pct===100?'var(--green)':'var(--accent)',letterSpacing:'-1px'}}>{pct}%</div>
                    <div style={{fontSize:11,color:'var(--ink-4)'}}>{done}/{total}</div>
                  </div>
                </div>
                <div style={{padding:'0 20px 4px'}}>
                  <div className="progress-track" style={{marginBottom:14}}>
                    <div className={`progress-fill ${pct===100?'green':''}`} style={{width:`${pct}%`}}/>
                  </div>
                  {o.steps?.map((s,i)=>(
                    <div key={i} className="check-row" onClick={()=>!s.done&&o.status!=='complete'&&step(o.id,i)}>
                      <div className={`check-box ${s.done?'done':''}`}>{s.done?'✓':''}</div>
                      <span className={`check-text ${s.done?'done':''}`}>{s.title}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })
      }
      {modal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
          <div className="modal">
            <div className="modal-handle"/>
            <div className="modal-title">Start Onboarding</div>
            {[{f:'clinicName',l:'Clinic Name',p:'e.g. Clínica Santa Rosa'},{f:'owner',l:'Owner (Slack ID)',p:'U0B728YJV7D'},{f:'contact',l:'Contact',p:'Name + WhatsApp'}].map(({f,l,p})=>(
              <div className="form-group" key={f}><label className="form-label">{l}</label><input className="form-input" value={form[f]} onChange={e=>setForm(prev=>({...prev,[f]:e.target.value}))} placeholder={p}/></div>
            ))}
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={create}>Start</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Patterns() {
  const [patterns, setPatterns] = useState([]);
  const [form, setForm] = useState({ triggerPhrase:'', intentTarget:'' });
  const load = () => api.get('/api/patterns').then(setPatterns);
  useEffect(() => { load(); }, []);

  const INTENTS = ['status','tasks','bugs','leads','onboarding','standup','hype','help','report','pipeline','uptime','greeting','joke','overwhelmed'];

  async function add() {
    if (!form.triggerPhrase || !form.intentTarget) return toast('Both fields required','error');
    const r = await api.post('/api/patterns', form);
    if (r?.id) { toast('Pattern added','success'); load(); setForm({triggerPhrase:'',intentTarget:''}); }
    else toast(r?.error||'Failed','error');
  }

  return (
    <div>
      <div className="section-header"><h1 className="section-title">Patterns</h1></div>
      <div className="card" style={{marginBottom:16}}>
        <div className="card-header"><div className="card-title">Teach TITAN</div></div>
        <div className="card-body">
          <div style={{display:'flex',gap:10,alignItems:'flex-end',flexWrap:'wrap'}}>
            <div style={{flex:2,minWidth:150}}>
              <label className="form-label">Trigger Phrase</label>
              <input className="form-input" value={form.triggerPhrase} onChange={e=>setForm(p=>({...p,triggerPhrase:e.target.value}))} placeholder='"cuanto llevamos"'/>
            </div>
            <div style={{color:'var(--ink-5)',fontSize:16,paddingBottom:8,flexShrink:0}}>→</div>
            <div style={{flex:1,minWidth:130}}>
              <label className="form-label">Intent</label>
              <select className="form-select" value={form.intentTarget} onChange={e=>setForm(p=>({...p,intentTarget:e.target.value}))}>
                <option value="">Select…</option>
                {INTENTS.map(i=><option key={i} value={i}>{i}</option>)}
              </select>
            </div>
            <button className="btn btn-primary btn-sm" style={{flexShrink:0,marginBottom:1}} onClick={add}>+ Add</button>
          </div>
        </div>
      </div>
      <div className="card">
        <div className="card-header"><div className="card-title">Learned Patterns ({patterns.length})</div></div>
        {patterns.length===0
          ? <div className="empty"><div className="empty-icon">🧠</div><div className="empty-text">No patterns yet</div></div>
          : patterns.map(p=>(
              <div key={p.id} className="pattern-row">
                <div className="pattern-trigger">"{p.trigger_phrase}"</div>
                <div className="pattern-arrow">→</div>
                <div className="pattern-intent">{p.intent_target}</div>
                <div className="pattern-count">{p.use_count}×</div>
                <span className={`badge ${p.active?'badge-green':'badge-gray'}`}>{p.active?'on':'off'}</span>
                <div style={{display:'flex',gap:4,marginLeft:8}}>
                  <button className="icon-action" onClick={()=>api.patch(`/api/patterns/${p.id}`,{active:!p.active}).then(load)}>{p.active?'⏸':'▶'}</button>
                  <button className="icon-action" style={{color:'var(--red)'}} onClick={()=>{if(confirm('Delete?'))api.delete(`/api/patterns/${p.id}`).then(load);}}>✕</button>
                </div>
              </div>
            ))
        }
      </div>
    </div>
  );
}

// ── SEARCH ───────────────────────────────
function Search({ onNavigate, onClose }) {
  const [q, setQ] = useState('');
  const [results, setResults] = useState({ tasks:[], leads:[], bugs:[], onbs:[] });
  const [loading, setLoading] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, []);

  useEffect(() => {
    if (q.length < 2) { setResults({tasks:[],leads:[],bugs:[],onbs:[]}); return; }
    setLoading(true);
    const t = setTimeout(async () => {
      const [tasks, leads, bugs, onbs] = await Promise.all([
        api.get(`/api/tasks?status=all`),
        api.get('/api/leads'),
        api.get('/api/bugs'),
        api.get('/api/onboardings'),
      ]);
      const lq = q.toLowerCase();
      setResults({
        tasks: tasks?.filter(t => t.title?.toLowerCase().includes(lq)).slice(0,4) || [],
        leads: leads?.filter(l => l.clinic_name?.toLowerCase().includes(lq)).slice(0,4) || [],
        bugs:  bugs?.filter(b => b.title?.toLowerCase().includes(lq)).slice(0,4) || [],
        onbs:  onbs?.filter(o => o.clinic_name?.toLowerCase().includes(lq)).slice(0,4) || [],
      });
      setLoading(false);
    }, 300);
    return () => clearTimeout(t);
  }, [q]);

  const total = Object.values(results).reduce((a,v)=>a+v.length, 0);

  return (
    <div className="cmd-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="cmd-box">
        <div className="cmd-input-wrap">
          <span className="cmd-input-icon">🔍</span>
          <input ref={inputRef} className="cmd-input" placeholder="Search tasks, leads, bugs, clinics…" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Escape'&&onClose()} />
          {loading && <div className="spinner" style={{flexShrink:0}}/>}
        </div>
        <div className="cmd-results">
          {q.length < 2 && <div className="empty" style={{padding:24}}><div className="empty-text">Type to search across everything</div></div>}
          {q.length >= 2 && total === 0 && !loading && <div className="empty" style={{padding:24}}><div className="empty-text">No results for "{q}"</div></div>}
          {results.tasks.length > 0 && (
            <div>
              <div className="cmd-group-label">Tasks</div>
              {results.tasks.map(t=>(
                <div key={t.id} className="cmd-item" onClick={()=>{onNavigate('tasks');onClose();}}>
                  <div className="cmd-item-icon">✓</div>
                  <span className="cmd-item-label">{t.title}</span>
                  <span className="cmd-item-desc">{t.status}</span>
                </div>
              ))}
            </div>
          )}
          {results.leads.length > 0 && (
            <div>
              <div className="cmd-group-label">Leads</div>
              {results.leads.map(l=>(
                <div key={l.id} className="cmd-item" onClick={()=>{onNavigate('leads');onClose();}}>
                  <div className="cmd-item-icon">◉</div>
                  <span className="cmd-item-label">{l.clinic_name}</span>
                  <span className="cmd-item-desc">{l.stage}</span>
                </div>
              ))}
            </div>
          )}
          {results.bugs.length > 0 && (
            <div>
              <div className="cmd-group-label">Bugs</div>
              {results.bugs.map(b=>(
                <div key={b.id} className="cmd-item" onClick={()=>{onNavigate('bugs');onClose();}}>
                  <div className="cmd-item-icon">⬡</div>
                  <span className="cmd-item-label">{b.title}</span>
                  <span className="cmd-item-desc">{b.sev_val}</span>
                </div>
              ))}
            </div>
          )}
          {results.onbs.length > 0 && (
            <div>
              <div className="cmd-group-label">Onboardings</div>
              {results.onbs.map(o=>(
                <div key={o.id} className="cmd-item" onClick={()=>{onNavigate('onboardings');onClose();}}>
                  <div className="cmd-item-icon">⬢</div>
                  <span className="cmd-item-label">{o.clinic_name}</span>
                  <span className="cmd-item-desc">{o.status}</span>
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="cmd-footer"><span><span className="kbd">ESC</span> close</span></div>
      </div>
    </div>
  );
}

    { text:'TITAN daily briefing posted to #daily-standup', time:'8:45am today', unread:true },
    { text:'Standup reminder sent to 2 team members', time:'9:00am today', unread:true },
    { text:'clinicflow.lat uptime check: 99.9% this week', time:'Yesterday', unread:false },
  ]);

  const unreadCount = notifs.filter(n=>n.unread).length;

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
  }, [theme]);

  useEffect(() => {
    if (api.token) {
      api.get('/api/me').then(u => { if (u?.username) setUser(u); }).finally(() => setChecking(false));
    } else {
      setChecking(false);
    }
    const iv = setInterval(() => { if (api.token) api.get('/api/overview').then(setOverview); }, 30000);
    if (api.token) api.get('/api/overview').then(setOverview);
    return () => clearInterval(iv);
  }, []);

  // Global keyboard shortcuts
  useEffect(() => {
    function onKey(e) {
      if ((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); setCmdOpen(p=>!p); }
      if ((e.metaKey||e.ctrlKey) && e.key==='f') { e.preventDefault(); setSearchOpen(p=>!p); }
      if (e.key==='Escape') { setCmdOpen(false); setSearchOpen(false); setNotifOpen(false); }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  if (checking) return <div className="loading" style={{height:'100dvh'}}><div className="spinner"/><span>Loading…</span></div>;
  if (!user) return <Login onLogin={u => { setUser(u); api.get('/api/overview').then(setOverview); }} />;

  const h = overview?.health || 'green';

  const NAV = [
    { key:'overview',     icon:'◈', label:'Overview' },
    { key:'tasks',        icon:'✓', label:'Tasks',      badge: overview?.blockedTasks > 0 ? overview.blockedTasks : null, bt:'badge-red-pill' },
    { key:'leads',        icon:'◉', label:'Pipeline',   badge: overview?.activeLeads > 0  ? overview.activeLeads  : null, bt:'badge-blue-pill' },
    { key:'bugs',         icon:'⬡', label:'Bugs',       badge: overview?.criticalBugs > 0 ? overview.criticalBugs : null, bt:'badge-red-pill' },
    { key:'onboardings',  icon:'⬢', label:'Onboarding', badge: overview?.activeOnbs > 0   ? overview.activeOnbs   : null, bt:'badge-blue-pill' },
    { key:'revenue',      icon:'📊', label:'Revenue' },
    { key:'activity',     icon:'⚡', label:'Activity' },
    { key:'deploy',       icon:'🚀', label:'Deploy' },
    { key:'standups',     icon:'⊕', label:'Standups' },
    { key:'intelligence', icon:'◈', label:'Intelligence' },
    { key:'patterns',     icon:'◫', label:'Patterns' },
    { key:'slackcontrol', icon:'▶', label:'Slack' },
    { key:'commands',     icon:'⌘', label:'Commands' },
  ];

  const MOBILE_NAV = [
    { key:'overview',    icon:'⌂',  label:'Home' },
    { key:'tasks',       icon:'✓',  label:'Tasks',   badge: overview?.blockedTasks > 0 },
    { key:'leads',       icon:'◉',  label:'Pipeline' },
    { key:'bugs',        icon:'⬡',  label:'Bugs',    badge: overview?.criticalBugs > 0 },
    { key:'slackcontrol',icon:'▶',  label:'Slack' },
  ];

  const TITLES = {
    overview:'Overview', tasks:'Tasks', leads:'Pipeline', bugs:'Bugs',
    onboardings:'Onboarding', revenue:'Revenue', activity:'Activity Feed',
    deploy:'Deploy', standups:'Standups', intelligence:'Intelligence',
    patterns:'Patterns', slackcontrol:'Slack Control', commands:'Commands'
  };

  const navigate = (p) => { setPage(p); setCmdOpen(false); setSearchOpen(false); };

  const renderPage = () => {
    switch(page) {
      case 'overview':     return <Overview />;
      case 'tasks':        return <Tasks />;
      case 'leads':        return <Leads />;
      case 'bugs':         return <Bugs />;
      case 'onboardings':  return <Onboardings />;
      case 'revenue':      return <Revenue />;
      case 'activity':     return <Activity />;
      case 'deploy':       return <Deploy />;
      case 'standups':     return <Standups />;
      case 'intelligence': return <Intelligence />;
      case 'patterns':     return <Patterns />;
      case 'slackcontrol': return <SlackControl />;
      case 'commands':     return <Commands />;
      default:             return <Overview />;
    }
  };

  return (
    <div className="app">
      {/* Sidebar */}
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-icon">T</div>
          <div className="logo-text">TITAN</div>
          <span className="logo-badge">v2</span>
        </div>

        <div className="sidebar-section">Main</div>
        {NAV.slice(0,9).map(n=>(
          <div key={n.key} className={`nav-item ${page===n.key?'active':''}`} onClick={()=>navigate(n.key)}>
            <span className="nav-icon">{n.icon}</span>
            {n.label}
            {n.badge&&<span className={`nav-badge ${n.bt}`}>{n.badge}</span>}
          </div>
        ))}

        <div className="sidebar-section">Intelligence</div>
        {NAV.slice(9).map(n=>(
          <div key={n.key} className={`nav-item ${page===n.key?'active':''}`} onClick={()=>navigate(n.key)}>
            <span className="nav-icon">{n.icon}</span>
            {n.label}
          </div>
        ))}

        <div className="sidebar-bottom">
          <div className="user-row">
            <div className="avatar">{user.username?.slice(0,2).toUpperCase()}</div>
            <div>
              <div className="user-name">{user.username}</div>
              <div className="user-role">Admin</div>
            </div>
          </div>
          <div className="sidebar-actions">
            <button className="sidebar-btn" onClick={() => setTheme(t=>t==='light'?'dark':'light')} title="Toggle theme">
              {theme==='light'?'☾':'☀'} {theme==='light'?'Dark':'Light'}
            </button>
            <button className="sidebar-btn danger" onClick={()=>{api.clearToken();setUser(null);}}>⏻ Out</button>
          </div>
        </div>
      </div>

      {/* Main */}
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{TITLES[page]}</div>

          <div className="search-trigger" onClick={()=>setSearchOpen(true)}>
            <span style={{fontSize:13}}>🔍</span>
            <span>Search…</span>
            <div className="search-kbd"><span className="kbd">⌘</span><span className="kbd">F</span></div>
          </div>

          <button className="icon-btn" onClick={()=>setCmdOpen(true)} title="Command Palette ⌘K">⌘</button>

          <div className={`health-chip ${h}`}>
            <div className="health-dot"/>
            {h==='green'?'Healthy':h==='yellow'?'Watch':'Critical'}
          </div>

          <button className="icon-btn" onClick={()=>setNotifOpen(p=>!p)} title="Notifications">
            🔔
            {unreadCount > 0 && <div className="notif-dot"/>}
          </button>

          <Clock/>
        </div>

        <div className="content">{renderPage()}</div>
      </div>

      {/* Mobile bottom nav */}
      <div className="bottom-nav">
        {MOBILE_NAV.map(n=>(
          <div key={n.key} className={`bnav-item ${page===n.key?'active':''}`} onClick={()=>navigate(n.key)}>
            {n.badge && <div className="bnav-badge"/>}
            <div className="bnav-icon">{n.icon}</div>
            <div className="bnav-label">{n.label}</div>
          </div>
        ))}
      </div>

      {/* Overlays */}
      {cmdOpen    && <CommandPalette onClose={()=>setCmdOpen(false)} onNavigate={navigate} />}
      {searchOpen && <Search onNavigate={navigate} onClose={()=>setSearchOpen(false)} />}
      {notifOpen  && <NotifDrawer onClose={()=>setNotifOpen(false)} notifications={notifs} onClear={()=>setNotifs([])} />}

      <Toasts/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
